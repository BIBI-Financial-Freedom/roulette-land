<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎡 룰렛 랜드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/hub.css">
</head>
<body>
  <div class="hub">
    <header class="hub-header">
      <h1 class="hub-title">🎡 룰렛 랜드</h1>
      <p class="hub-subtitle">내기의 모든 것, 여기서 시작!</p>
    </header>

    <main class="game-grid">
      <!-- 커피 슬롯머신 -->
      <a href="Coffee/src/index.html" class="game-card card-coffee">
        <div class="card-glow"></div>
        <div class="card-icon">🎰</div>
        <div class="card-body">
          <h2 class="card-title">원강랜드</h2>
          <p class="card-desc">커피내기 슬롯머신</p>
          <ul class="card-tags">
            <li>☕ 커피내기</li>
            <li>🎰 슬롯</li>
          </ul>
        </div>
        <span class="card-arrow">→</span>
      </a>

      <!-- 러시안 룰렛 -->
      <a href="russianroulette/src/index.html" class="game-card card-roulette">
        <div class="card-glow"></div>
        <div class="card-icon">🔫</div>
        <div class="card-body">
          <h2 class="card-title">러시안 룰렛</h2>
          <p class="card-desc">꽝 뽑기 — 누가 걸릴까?</p>
          <ul class="card-tags">
            <li>💀 벌칙내기</li>
            <li>🎯 5가지 모드</li>
          </ul>
        </div>
        <span class="card-arrow">→</span>
      </a>

      <!-- 준비 중 카드 -->
      <div class="game-card card-coming">
        <div class="card-icon">🔮</div>
        <div class="card-body">
          <h2 class="card-title">???</h2>
          <p class="card-desc">새로운 게임 준비 중...</p>
          <ul class="card-tags">
            <li>🚧 Coming Soon</li>
          </ul>
        </div>
      </div>
    </main>

    <footer class="hub-footer">
      <p>© 2026 룰렛 랜드 · 내기는 즐겁게, 결과는 공정하게</p>
    </footer>
  </div>
</body>
</html>
