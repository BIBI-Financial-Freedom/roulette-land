name: Deploy to GitHub Pages

on:
  push:
    # 저장소의 기본 배포 브랜치와 동일하게 유지해야 합니다.
    # 이 값을 바꾸면 일반 배포 시 GitHub Pages 워크플로가 실행되지 않을 수 있습니다.
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 이 저장소에는 루트 기준 src/ 디렉터리가 없습니다.
          # hub/, coffee/, russian-roulette/가 함께 포함되도록 루트 경로를 유지해야 합니다.
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
