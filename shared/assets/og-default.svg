<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">룰렛 랜드 대표 이미지</title>
  <desc id="desc">커피내기 슬롯머신과 러시안 룰렛 꽝 뽑기를 소개하는 대표 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#111318" />
      <stop offset="50%" stop-color="#1a2233" />
      <stop offset="100%" stop-color="#5a241c" />
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ffd54a" />
      <stop offset="100%" stop-color="#ff8c42" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" rx="36" />
  <circle cx="190" cy="128" r="120" fill="#ffffff" fill-opacity="0.05" />
  <circle cx="1040" cy="512" r="180" fill="#ffffff" fill-opacity="0.06" />

  <text x="96" y="190" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="54" fill="#ffd54a" font-weight="800">
    랜덤 내기 웹게임 모음
  </text>
  <text x="96" y="310" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="116" fill="url(#accent)" font-weight="900">
    룰렛 랜드
  </text>
  <text x="96" y="390" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="34" fill="#f6f7fb" font-weight="600">
    커피내기 슬롯머신 · 벌칙 룰렛 · 꽝 뽑기 · 랜덤 추첨 게임
  </text>

  <rect x="96" y="454" width="360" height="92" rx="22" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.14" />
  <text x="138" y="511" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="42" fill="#ffffff" font-weight="700">
    🎰 슬롯머신
  </text>

  <rect x="492" y="454" width="420" height="92" rx="22" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.14" />
  <text x="536" y="511" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="42" fill="#ffffff" font-weight="700">
    🔫 러시안 룰렛 꽝 뽑기
  </text>
</svg>